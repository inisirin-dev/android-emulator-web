<!DOCTYPE html>
<html>
<head>
<title>Java Phone Emulator</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

.phone{
width:360px;
margin:auto;
border:6px solid #444;
border-radius:25px;
padding:10px;
background:#111;
}

.screen{
width:100%;
height:420px;
border:3px solid #333;
border-radius:10px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.keypad{
margin-top:10px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

button{
padding:12px;
font-size:18px;
background:#333;
color:white;
border:none;
border-radius:8px;
}
</style>

</head>

<body>

<h2>Java Phone Emulator</h2>

<input type="file" id="jar">

<div class="phone">

<div class="screen">
<iframe src="https://jsme.vercel.app/"></iframe>
</div>

<div class="keypad">
<button>1</button>
<button>2</button>
<button>3</button>

<button>4</button>
<button>5</button>
<button>6</button>

<button>7</button>
<button>8</button>
<button>9</button>

<button>*</button>
<button>0</button>
<button>#</button>
</div>

</div>

</body>
</html>
