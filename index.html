<!DOCTYPE html>
<html>
<head>
<title>Android Emulator</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

.phone{
width:360px;
height:640px;
margin:auto;
border:6px solid #444;
border-radius:25px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<h2>Android Emulator</h2>

<button onclick="startEmulator()">START EMULATOR</button>

<br>

<input type="file" id="apkFile">

<div class="phone">
<iframe id="emu" src=""></iframe>
</div>

<script>

function startEmulator(){
document.getElementById("emu").src =
"https://appetize.io/embed/";
}

document.getElementById("apkFile").addEventListener("change", function(){
alert("APK selected. Upload emulator service needed to run it.");
});

</script>

</body>
</html>
