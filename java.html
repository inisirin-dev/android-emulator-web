<!DOCTYPE html>
<html>
<head>
<title>Java Game Emulator</title>

<style>
body{
background:black;
color:white;

}

.phone{
width:360px;
height:640px;
margin:auto;
border:6px solid #444;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;

}

button{
padding:10px;

}

<body>

<h2>Java Game Emulator</h2>

<input type="file" id="jarfile">

<div class="phone">
<canvas id="screen"></canvas>
</div>

<script>

document.getElementById("jarfile").addEventListener("change",function(){

alert("Game .jar dimuat. Emulator ringan sedang dalam mode demo.");

});

</script>

</body>
